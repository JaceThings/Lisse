name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm >=11.5.1, which supports OIDC trusted
          # publishing natively. Keeps CI on Node 22 for compat testing.
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      # Regenerate the aggregate root CHANGELOG.md from per-package changelogs
      # and, if anything changed, push the update to the open version-packages
      # PR branch (which changesets/action has just created or updated). Runs
      # only when a version PR exists; skipped on publish-only runs.
      - name: Update root CHANGELOG
        if: steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.published != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_BRANCH="changeset-release/${GITHUB_REF_NAME}"
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
          pnpm tsx scripts/update-root-changelog.ts
          if [[ -n "$(git status --porcelain CHANGELOG.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "docs(changelog): regenerate root CHANGELOG"
            git push origin "$PR_BRANCH"
          fi
